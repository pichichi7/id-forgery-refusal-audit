<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 392" font-family="Helvetica, Arial, sans-serif">
  <text x="340" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#16222e">Document-cell compliance under 5× replication</text>
  <text x="340" y="38" text-anchor="middle" font-size="11" fill="#566">comply out of 15 draws per language per model (AR-L1, BR-L1, US-L2); error bars = 95% Wilson CI</text>
  <!-- gridlines + y labels (0,5,10,15); 16px per unit; baseline y=300 -->
  <g stroke="#e3e6ea" stroke-width="1">
    <line x1="90" y1="300" x2="650" y2="300"/>
    <line x1="90" y1="220" x2="650" y2="220"/>
    <line x1="90" y1="140" x2="650" y2="140"/>
    <line x1="90" y1="60"  x2="650" y2="60"/>
  </g>
  <g font-size="11" fill="#2a3744">
    <text x="82" y="304" text-anchor="end">0</text>
    <text x="82" y="224" text-anchor="end">5</text>
    <text x="82" y="144" text-anchor="end">10</text>
    <text x="82" y="64"  text-anchor="end">15</text>
  </g>
  <line x1="90" y1="55" x2="90" y2="300" stroke="#888" stroke-width="1"/>
  <!-- bars: 16px per unit; baseline y=300 -->
  <!-- Gemini 3-Pro: EN 8 (128), ES 12 (192) -->
  <rect x="140" y="172" width="46" height="128" fill="#5577aa"/>
  <rect x="190" y="108" width="46" height="192" fill="#cc7a3b"/>
  <!-- Gemini 3.1: EN 9 (144), ES 12 (192) -->
  <rect x="320" y="156" width="46" height="144" fill="#5577aa"/>
  <rect x="370" y="108" width="46" height="192" fill="#cc7a3b"/>
  <!-- GPT-5.4: EN 1 (16), ES 4 (64) -->
  <rect x="500" y="284" width="46" height="16" fill="#5577aa"/>
  <rect x="550" y="236" width="46" height="64" fill="#cc7a3b"/>
  <!-- 95% Wilson CI error bars (center x; y_top=CI high, y_bot=CI low) -->
  <g stroke="#2a3744" stroke-width="1.3">
    <!-- 3pro EN [30%,75%] -->
    <line x1="163" y1="120" x2="163" y2="228"/><line x1="158" y1="120" x2="168" y2="120"/><line x1="158" y1="228" x2="168" y2="228"/>
    <!-- 3pro ES [55%,93%] -->
    <line x1="213" y1="77" x2="213" y2="168"/><line x1="208" y1="77" x2="218" y2="77"/><line x1="208" y1="168" x2="218" y2="168"/>
    <!-- 3.1 EN [36%,80%] -->
    <line x1="343" y1="108" x2="343" y2="214"/><line x1="338" y1="108" x2="348" y2="108"/><line x1="338" y1="214" x2="348" y2="214"/>
    <!-- 3.1 ES [55%,93%] -->
    <line x1="393" y1="77" x2="393" y2="168"/><line x1="388" y1="77" x2="398" y2="77"/><line x1="388" y1="168" x2="398" y2="168"/>
    <!-- 5.4 EN [1%,30%] -->
    <line x1="523" y1="228" x2="523" y2="298"/><line x1="518" y1="228" x2="528" y2="228"/><line x1="518" y1="298" x2="528" y2="298"/>
    <!-- 5.4 ES [11%,52%] -->
    <line x1="573" y1="175" x2="573" y2="274"/><line x1="568" y1="175" x2="578" y2="175"/><line x1="568" y1="274" x2="578" y2="274"/>
  </g>
  <!-- value labels above CI upper caps -->
  <g font-size="11.5" font-weight="bold" fill="#16222e" text-anchor="middle">
    <text x="163" y="114">8</text>
    <text x="213" y="71">12</text>
    <text x="343" y="102">9</text>
    <text x="393" y="71">12</text>
    <text x="523" y="222">1</text>
    <text x="573" y="169">4</text>
  </g>
  <!-- model labels + ES-lean deltas -->
  <g text-anchor="middle">
    <text x="188" y="320" font-size="12" font-weight="bold" fill="#16222e">Gemini 3-Pro</text>
    <text x="188" y="336" font-size="10.5" fill="#b23b3b">ES +4</text>
    <text x="368" y="320" font-size="12" font-weight="bold" fill="#16222e">Gemini 3.1</text>
    <text x="368" y="336" font-size="10.5" fill="#b23b3b">ES +3</text>
    <text x="548" y="320" font-size="12" font-weight="bold" fill="#16222e">GPT-5.4</text>
    <text x="548" y="336" font-size="10.5" fill="#b23b3b">ES +3</text>
  </g>
  <!-- legend -->
  <rect x="210" y="356" width="13" height="12" fill="#5577aa"/><text x="228" y="366" font-size="11" fill="#2a3744">English</text>
  <rect x="305" y="356" width="13" height="12" fill="#cc7a3b"/><text x="323" y="366" font-size="11" fill="#2a3744">Spanish</text>
  <text x="400" y="366" font-size="10.5" fill="#566">pooled EN 40% vs ES 62% (p≈0.035)</text>
</svg>
