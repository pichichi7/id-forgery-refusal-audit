<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr3" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#444"/></marker>
  </defs>
  <text x="380" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#16222e">A defense-in-depth ladder: each control has a known evasion; AI cheapens the lower rungs first</text>

  <!-- rising attacker-cost arrow (diagonal) -->
  <line x1="40" y1="358" x2="715" y2="92" stroke="#9aa6b2" stroke-width="2.5" marker-end="url(#arr3)"/>
  <text x="120" y="372" font-size="11" fill="#6a7682" font-style="italic">attacker cost / sophistication →</text>

  <!-- Rung 1 -->
  <rect x="30" y="300" width="180" height="56" rx="7" fill="#fbecec" stroke="#b23b3b" stroke-width="1.4"/>
  <text x="120" y="322" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#16222e">Document-image forensics</text>
  <text x="120" y="340" text-anchor="middle" font-size="10" fill="#b23b3b">defeated by AI forgery (≈ free)</text>

  <!-- Rung 2 -->
  <rect x="210" y="238" width="190" height="56" rx="7" fill="#fbecec" stroke="#b23b3b" stroke-width="1.4"/>
  <text x="305" y="258" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#16222e">Source-grounded biometric</text>
  <text x="305" y="272" text-anchor="middle" font-size="10" fill="#3a4a59">+ liveness (SID / DataValid)</text>
  <text x="305" y="287" text-anchor="middle" font-size="10" fill="#b23b3b">defeated by deepfake / injection</text>

  <!-- Rung 3 -->
  <rect x="400" y="176" width="195" height="56" rx="7" fill="#fbecec" stroke="#b23b3b" stroke-width="1.4"/>
  <text x="497" y="196" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#16222e">Biometric de-duplication</text>
  <text x="497" y="210" text-anchor="middle" font-size="10" fill="#3a4a59">"one face, many IDs"</text>
  <text x="497" y="225" text-anchor="middle" font-size="10" fill="#b23b3b">defeated by sourcing many real faces</text>

  <!-- Rung 4 (durable) -->
  <rect x="560" y="100" width="190" height="62" rx="7" fill="#e8f3ec" stroke="#2e7d52" stroke-width="1.6"/>
  <text x="655" y="122" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#16222e">Coordination detection</text>
  <text x="655" y="137" text-anchor="middle" font-size="10" fill="#3a4a59">shared devices, funding, cash-out</text>
  <text x="655" y="152" text-anchor="middle" font-size="10" fill="#2e7d52" font-weight="bold">durable residual signal</text>

  <!-- step connectors -->
  <path d="M210,316 L210,294" stroke="#888" stroke-width="1.3" fill="none"/>
  <path d="M400,254 L400,232" stroke="#888" stroke-width="1.3" fill="none"/>
  <path d="M560,192 L560,162" stroke="#888" stroke-width="1.3" fill="none"/>
</svg>
